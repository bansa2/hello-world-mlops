name: ci to train and save the model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-pip:
    name: Train and test the model
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.11, 3.12]
    
    steps:
     - name: checkout
       uses: actions/checkout@v4

     - name: setup python
       uses: actions/setup-python@v4
       with:
         python-versions = ${{ matrix.python }}

     - name: Upgrade pip
       run: python -m pip install --upgrade pip setuptools wheel

     - name: Install project dependecied
       run: python -m pip install -r requirements.txt

     - name: Train teh model
       run: |
         python train.python
         ls -la artifacts

     - name: Upload artifacts
       uses: actions/upload-artifact@v4
       with:
         name: ml-artifacts-${{ matrix.python }}-${{ github.run_id }}
         path: artifacts
